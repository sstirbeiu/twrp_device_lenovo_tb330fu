name: Build TWRP for TB330FU

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - 'twrp-12.1'
          - 'twrp-14'

env:
  MANIFEST_URL: 'https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git'
  DEVICE_PATH: 'device/lenovo/TB330FU'
  DEVICE_NAME: 'TB330FU'
  MAKEFILE_NAME: 'omni_TB330FU'
  BUILD_TARGET: 'vendorbootimage'

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout Device Tree
        uses: actions/checkout@v4
        with:
          path: workspace/device/lenovo/TB330FU

      - name: Free Disk Space
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android/sdk
          df -h

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3-setuptools python3-pip
          sudo ln -sf /usr/bin/python3 /usr/bin/python
          df -h

      - name: Install Repo tool
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          echo "PATH=$HOME/bin:$PATH" >> $GITHUB_ENV

      - name: Initialize Repo
        run: |
          export PATH=$HOME/bin:$PATH
          mkdir -p workspace/twrp
          cd workspace/twrp
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          repo init --depth=1 -u ${{ env.MANIFEST_URL }} -b ${{ inputs.MANIFEST_BRANCH }}
          
      - name: Sync Repo
        run: |
          export PATH=$HOME/bin:$PATH
          cd workspace/twrp
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
          df -h

      - name: Copy Device Tree to Repo
        run: |
          mkdir -p workspace/twrp/${{ env.DEVICE_PATH }}
          cp -r workspace/device/lenovo/TB330FU/* workspace/twrp/${{ env.DEVICE_PATH }}/
          ls -la workspace/twrp/${{ env.DEVICE_PATH }}

      - name: Build Recovery Image
        run: |
          export PATH=$HOME/bin:$PATH
          cd workspace/twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch ${{ env.MAKEFILE_NAME }}-eng
          make clean
          mka ${{ env.BUILD_TARGET }}
          df -h

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-${{ env.DEVICE_NAME }}-${{ inputs.MANIFEST_BRANCH }}
          path: |
            workspace/twrp/out/target/product/${{ env.DEVICE_NAME }}/vendor_boot.img
            workspace/twrp/out/target/product/${{ env.DEVICE_NAME }}/ramdisk-recovery.cpio
            workspace/twrp/out/target/product/${{ env.DEVICE_NAME }}/ramdisk-recovery.img
